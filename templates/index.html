<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 Chatbot IPA SD — Belajar Sains Yuk!</title>
    <meta name="description" content="Chatbot edukasi IPA untuk siswa SD kelas 4-5. Tanya tentang fotosintesis, pencernaan, adaptasi, dan lainnya!">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* RESET & BASE */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #1a1a2e;
            --accent-primary: #6c63ff;
            --accent-secondary: #a78bfa;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --text-primary: #e8e8f0;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --border: rgba(255, 255, 255, 0.06);
            --glass: rgba(255, 255, 255, 0.03);
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background animated gradient */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(108, 99, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(167, 139, 250, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(52, 211, 153, 0.04) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgFloat {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-2%, -2%) rotate(3deg); }
        }

        /* MAIN LAYOUT */
        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            height: 96vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow), 0 0 80px rgba(108, 99, 255, 0.05);
        }

        /* HEADER */
        .chat-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .header-info h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
        }

        .header-badges {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--glass);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .badge-time { color: var(--accent-secondary); }
        .badge-strikes { color: var(--success); }
        .badge-strikes.warning { color: var(--warning); }
        .badge-strikes.danger { color: var(--danger); }

        /* CHAT AREA */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 4px;
        }

        /* Message bubbles */
        .message {
            display: flex;
            gap: 10px;
            max-width: 88%;
            animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.bot .message-avatar {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        }
        .message.user .message-avatar {
            background: linear-gradient(135deg, #374151, #4b5563);
        }

        .message-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.bot .message-bubble {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--accent-primary), #7c3aed);
            border-top-right-radius: 4px;
            color: #fff;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 4px;
        }

        .message.user .message-meta {
            justify-content: flex-end;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .message-category {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(108, 99, 255, 0.15);
            color: var(--accent-secondary);
            font-weight: 600;
        }

        .message-confidence {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* Warning message styling */
        .message-bubble.warning-msg {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .message-bubble.cooldown-msg {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 14px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            border-top-left-radius: 4px;
            margin-left: 42px;
        }

        .typing-indicator.show { display: flex; }

        .typing-dots {
            display: flex;
            gap: 5px;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.2s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Welcome message */
        .welcome-card {
            text-align: center;
            padding: 32px 20px;
            animation: msgIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .welcome-emoji {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .welcome-card h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-secondary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-card p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .topic-chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .topic-chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .topic-chip:hover {
            background: rgba(108, 99, 255, 0.15);
            border-color: var(--accent-primary);
            color: var(--accent-secondary);
            transform: translateY(-1px);
        }

        /* INPUT AREA */
        .chat-input-area {
            padding: 16px 20px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px 6px 6px 18px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #chat-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            padding: 8px 0;
        }

        #chat-input::placeholder {
            color: var(--text-muted);
        }

        #send-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-primary), #7c3aed);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        #send-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        #send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #send-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Screen time reminder bar */
        .screen-reminder {
            display: none;
            padding: 10px 16px;
            margin-bottom: 8px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            animation: msgIn 0.3s ease;
        }

        .screen-reminder.soft {
            display: flex;
            background: rgba(167, 139, 250, 0.1);
            border: 1px solid rgba(167, 139, 250, 0.2);
            color: var(--accent-secondary);
        }

        .screen-reminder.strong {
            display: flex;
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.2);
            color: var(--warning);
        }

        /* RESPONSIVE */
        @media (max-width: 560px) {
            .app-container {
                max-width: 100%;
                height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- HEADER -->
    <div class="chat-header">
        <div class="header-avatar">🔬</div>
        <div class="header-info">
            <h1>Chatbot IPA SD</h1>
            <div class="header-status">
                <span class="status-dot"></span>
                <span>Online • Siap membantu belajar</span>
            </div>
        </div>
        <div class="header-badges">
            <div class="badge badge-time" id="badge-time">⏱️ 0m</div>
            <div class="badge badge-strikes" id="badge-strikes">⚡ 0/3</div>
        </div>
    </div>

    <!-- CHAT MESSAGES -->
    <div class="chat-messages" id="chat-messages">
        <div class="welcome-card">
            <div class="welcome-emoji">🧪</div>
            <h2>Halo! Selamat datang di Chatbot IPA 🌟</h2>
            <p>Aku bisa membantu kamu belajar sains! Tanyakan tentang fotosintesis, pencernaan, adaptasi, dan banyak lagi.</p>
            <div class="topic-chips">
                <span class="topic-chip" onclick="askQuestion('Apa itu fotosintesis?')">🌱 Fotosintesis</span>
                <span class="topic-chip" onclick="askQuestion('Bagaimana cara kerja pencernaan?')">🫁 Pencernaan</span>
                <span class="topic-chip" onclick="askQuestion('Apa itu adaptasi?')">🦎 Adaptasi</span>
                <span class="topic-chip" onclick="askQuestion('Mengapa pelangi muncul?')">🌈 Cahaya</span>
                <span class="topic-chip" onclick="askQuestion('Apa saja sumber daya alam?')">🌍 SDA</span>
            </div>
        </div>

        <!-- Typing indicator -->
        <div class="typing-indicator" id="typing-indicator">
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <!-- INPUT AREA -->
    <div class="chat-input-area">
        <div class="screen-reminder" id="screen-reminder"></div>
        <div class="input-wrapper">
            <input type="text" id="chat-input" placeholder="Tanyakan tentang IPA..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    // CONFIGURATION
    const API_BASE = window.location.origin;
    const SESSION_ID = 'session_' + Math.random().toString(36).substr(2, 9);
    let isWaiting = false;

    // SEND MESSAGE
    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const message = input.value.trim();
        if (!message || isWaiting) return;

        // Remove welcome card
        const welcome = document.querySelector('.welcome-card');
        if (welcome) welcome.remove();

        // Add user message
        addMessage(message, 'user');
        input.value = '';
        input.focus();

        // Show typing indicator
        setTyping(true);
        isWaiting = true;
        document.getElementById('send-btn').disabled = true;

        try {
            const response = await fetch(`${API_BASE}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, session_id: SESSION_ID })
            });

            const data = await response.json();

            setTyping(false);

            // Determine message style based on moderation
            let bubbleClass = '';
            if (data.moderation) {
                if (data.moderation.status === 'warning') bubbleClass = 'warning-msg';
                if (data.moderation.status === 'cooldown') bubbleClass = 'cooldown-msg';
                updateStrikes(data.moderation.strikes, data.moderation.status);
            }

            // Add bot response
            addMessage(data.answer || data.error || 'Maaf, terjadi kesalahan.', 'bot', {
                category: data.category,
                confidence: data.confidence,
                bubbleClass
            });

            // Update screen time
            if (data.screen_time) {
                updateScreenTime(data.screen_time);
            }

        } catch (error) {
            setTyping(false);
            addMessage('Maaf, tidak bisa terhubung ke server. Pastikan server sudah jalan ya! 😊', 'bot', {
                bubbleClass: 'warning-msg'
            });
            console.error('Error:', error);
        }

        isWaiting = false;
        document.getElementById('send-btn').disabled = false;
    }

    // ADD MESSAGE TO CHAT
    function addMessage(text, type, options = {}) {
        const container = document.getElementById('chat-messages');
        const typing = document.getElementById('typing-indicator');

        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;

        const avatar = type === 'bot' ? '🔬' : '👤';
        const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

        let metaHtml = `<span class="message-time">${time}</span>`;
        if (options.category) {
            metaHtml += `<span class="message-category">${options.category}</span>`;
        }
        if (options.confidence && options.confidence > 0) {
            metaHtml += `<span class="message-confidence">${(options.confidence * 100).toFixed(0)}% match</span>`;
        }

        // Convert newlines to <br>
        const formattedText = text.replace(/\n/g, '<br>');

        msgDiv.innerHTML = `
            <div class="message-avatar">${avatar}</div>
            <div class="message-content">
                <div class="message-bubble ${options.bubbleClass || ''}">${formattedText}</div>
                <div class="message-meta">${metaHtml}</div>
            </div>
        `;

        container.insertBefore(msgDiv, typing);
        container.scrollTop = container.scrollHeight;
    }

    // UI HELPERS
    function setTyping(show) {
        const el = document.getElementById('typing-indicator');
        el.classList.toggle('show', show);
        if (show) {
            const container = document.getElementById('chat-messages');
            container.scrollTop = container.scrollHeight;
        }
    }

    function updateScreenTime(data) {
        const badge = document.getElementById('badge-time');
        const mins = Math.round(data.duration_minutes);
        badge.textContent = `⏱️ ${mins}m`;

        const reminderEl = document.getElementById('screen-reminder');
        if (data.reminder) {
            reminderEl.textContent = data.reminder;
            reminderEl.className = `screen-reminder ${data.should_break ? 'strong' : 'soft'}`;
        }
    }

    function updateStrikes(count, status) {
        const badge = document.getElementById('badge-strikes');
        badge.textContent = `⚡ ${count}/3`;
        badge.className = 'badge badge-strikes';
        if (count >= 3) badge.classList.add('danger');
        else if (count >= 1) badge.classList.add('warning');
    }

    function askQuestion(question) {
        document.getElementById('chat-input').value = question;
        sendMessage();
    }

    // KEYBOARD EVENT
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // Focus input on load
    document.getElementById('chat-input').focus();
</script>

</body>
</html>
